<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inusualchat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary:       #2563EB;
      --primary-dark:  #1D4ED8;
      --primary-light: #DBEAFE;
      --accent:        #10B981;
      --surface:       #FFFFFF;
      --surface-2:     #F1F5F9;
      --border:        #E2E8F0;
      --text:          #0F172A;
      --text-muted:    #64748B;
      --radius-sm:     6px;
      --radius-md:     10px;
      --radius-lg:     14px;
      --radius-full:   9999px;
      --shadow-sm:     0 1px 3px rgba(0,0,0,.08);
      --shadow-md:     0 4px 12px rgba(0,0,0,.10);
      --shadow-lg:     0 8px 24px rgba(0,0,0,.12);
    }

    [data-theme="dark"] {
      --surface:       #0F172A;
      --surface-2:     #1E293B;
      --border:        #334155;
      --text:          #F1F5F9;
      --text-muted:    #94A3B8;
      --primary-light: #1E3A5F;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.9375rem;
      color: var(--text);
      background: linear-gradient(135deg, #1E40AF 0%, #1D4ED8 40%, #0EA5E9 100%);
      min-height: 100vh;
      padding: 20px 16px 32px;
    }

    [data-theme="dark"] body {
      background: linear-gradient(135deg, #0c1a3a 0%, #0f172a 60%, #0c2340 100%);
    }

    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    /* ── App wrapper ── */
    .app {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Glass panel ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--primary);
      text-decoration: none;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .online-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .online-dot {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: var(--radius-full);
    }

    .icon-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .icon-btn:hover {
      background: var(--primary-light);
      color: var(--primary);
      border-color: var(--primary);
    }

    .icon-btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

    /* ── Main layout ── */
    .main {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 14px;
      align-items: start;
    }

    /* ── Video column ── */
    .video-col { display: flex; flex-direction: column; gap: 14px; }

    /* URL bar */
    .url-bar {
      display: flex;
      gap: 8px;
      padding: 12px 14px;
    }

    .url-bar input {
      flex: 1;
      min-width: 0;
      padding: 9px 13px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      color: var(--text);
      font-family: inherit;
      font-size: 0.875rem;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .url-bar input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
      background: var(--surface);
    }

    .url-bar input::placeholder { color: var(--text-muted); }

    .btn-add {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .btn-add:hover { background: var(--primary-dark); }
    .btn-add:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

    /* Player */
    .player-wrap {
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    #youtube-player {
      width: 100%;
      height: 100%;
      display: block;
      border: none;
    }

    /* Playlist */
    .playlist-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px 8px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-muted);
    }

    .playlist-badge {
      background: var(--primary-light);
      color: var(--primary);
      font-size: 0.72rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: var(--radius-full);
    }

    #playlist-container { display: flex; flex-direction: column; }

    .pl-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      cursor: pointer;
      border-top: 1px solid var(--border);
      transition: background 0.15s;
    }

    .pl-item:hover { background: var(--primary-light); }

    .pl-item.active {
      background: var(--primary-light);
      border-left: 3px solid var(--primary);
      padding-left: 11px;
    }

    .pl-num {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--primary);
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .pl-thumb {
      width: 60px;
      height: 45px;
      object-fit: cover;
      border-radius: var(--radius-sm);
      background: var(--border);
      flex-shrink: 0;
    }

    .pl-info { flex: 1; min-width: 0; }

    .pl-title {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pl-now {
      font-size: 0.7rem;
      color: var(--accent);
      font-weight: 600;
      margin-top: 2px;
    }

    .pl-remove {
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .pl-item:hover .pl-remove { opacity: 1; }
    .pl-remove:hover { color: #EF4444; }

    .pl-thumb-mp4 {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface-2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    /* ── Right column ── */
    .right-col {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* User card */
    .user-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
    }

    .user-card input {
      flex: 1;
      min-width: 0;
      padding: 9px 13px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .user-card input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
      background: var(--surface);
    }

    .user-card input.input-error {
      border-color: #EF4444;
      box-shadow: 0 0 0 3px rgba(239,68,68,.12);
    }

    .user-card input.input-ok {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(16,185,129,.12);
    }

    .user-card input::placeholder { color: var(--text-muted); }

    .username-status {
      font-size: 0.75rem;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .username-status.ok   { color: var(--accent); }
    .username-status.err  { color: #EF4444; }

    /* Chat panel */
    .chat-panel {
      display: flex;
      flex-direction: column;
      height: 480px;
    }

    .chat-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-title {
      display: flex;
      align-items: center;
      gap: 7px;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .live-dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: var(--radius-full);
      animation: blink 2s infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }
    @media (prefers-reduced-motion: reduce) { .live-dot { animation: none; } }

    #chat-mensagens {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #chat-mensagens::-webkit-scrollbar { width: 4px; }
    #chat-mensagens::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      animation: fadeUp .18s ease-out;
    }

    @keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
    @media (prefers-reduced-motion: reduce) { .msg { animation: none; } }

    .msg-av {
      width: 28px; height: 28px;
      border-radius: var(--radius-full);
      color: #fff;
      font-size: 0.68rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .msg-body { flex: 1; min-width: 0; }

    .msg-meta {
      display: flex;
      align-items: baseline;
      gap: 5px;
      margin-bottom: 2px;
    }

    .msg-name { font-size: 0.78rem; font-weight: 600; color: var(--text); }
    .msg-time { font-size: 0.68rem; color: var(--text-muted); }
    .msg-text { font-size: 0.85rem; color: var(--text); line-height: 1.45; word-break: break-word; }

    .msg-sys {
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-muted);
      padding: 1px 0;
    }

    .chat-input-row {
      display: flex;
      gap: 7px;
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #chat-input {
      flex: 1;
      min-width: 0;
      padding: 8px 11px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      color: var(--text);
      font-family: inherit;
      font-size: 0.875rem;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    #chat-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
      background: var(--surface);
    }

    #chat-input::placeholder { color: var(--text-muted); }

    #enviar-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 8px 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    #enviar-btn:hover { background: var(--primary-dark); }
    #enviar-btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

    /* Toast */
    #toast-wrap {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 200;
    }

    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 9px 14px;
      font-size: 0.85rem;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: 280px;
      animation: slideIn .2s ease-out;
    }

    .toast.error  { border-left: 3px solid #EF4444; }
    .toast.success{ border-left: 3px solid var(--accent); }
    .toast.info   { border-left: 3px solid var(--primary); }

    @keyframes slideIn { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:translateX(0)} }

    /* Responsive */
    @media (max-width: 860px) {
      .main { grid-template-columns: 1fr; }
      .chat-panel { height: 360px; }
    }

    @media (max-width: 480px) {
      body { padding: 10px 8px 24px; }
      .url-bar { flex-direction: column; }
      .btn-add { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="panel header">
    <a href="#" class="logo" aria-label="Inusualchat">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Inusualchat
    </a>
    <div class="header-right">
      <span class="online-badge">
        <span class="online-dot" aria-hidden="true"></span>
        <span id="online-num">1</span> online
      </span>
      <button id="theme-btn" class="icon-btn" aria-label="Alternar tema claro/escuro">
        <svg id="icon-sun" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="icon-moon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- Main -->
  <div class="main">

    <!-- Video column -->
    <div class="video-col">

      <!-- URL input -->
      <div class="panel url-bar">
        <label for="video-url-input" class="sr-only">URL do YouTube</label>
        <input type="url" id="video-url-input" placeholder="Cole link do YouTube ou URL de vídeo .mp4..." autocomplete="off">
        <button id="add-video-btn" class="btn-add">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Adicionar
        </button>
      </div>

      <!-- Player -->
      <div class="panel player-wrap" id="player-wrap">
        <iframe id="youtube-player" src="" frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen title="Player YouTube"></iframe>
        <video id="mp4-player" controls style="display:none;width:100%;height:100%;background:#000;" title="Player de vídeo"></video>
      </div>

      <!-- Playlist -->
      <div class="panel">
        <div class="playlist-header">
          <span>Fila de reprodução</span>
          <span class="playlist-badge" id="playlist-count">0</span>
        </div>
        <div id="playlist-container" role="list" aria-label="Playlist"></div>
      </div>

    </div>

    <!-- Right column -->
    <div class="right-col">

      <!-- User -->
      <div class="panel user-card">
        <label for="username-input" class="sr-only">Seu nome</label>
        <input type="text" id="username-input" placeholder="Digite seu nome para entrar no chat..." maxlength="32" autocomplete="nickname">
        <span id="username-status" class="username-status" aria-live="polite"></span>
      </div>

      <!-- Chat -->
      <div class="panel chat-panel">
        <div class="chat-head">
          <div class="chat-title">
            <div class="live-dot" aria-hidden="true"></div>
            Chat ao Vivo
          </div>
        </div>
        <div id="chat-mensagens" role="log" aria-live="polite" aria-label="Mensagens"></div>
        <div class="chat-input-row">
          <label for="chat-input" class="sr-only">Mensagem</label>
          <input type="text" id="chat-input" placeholder="Digite sua mensagem..." maxlength="300" autocomplete="off">
          <button id="enviar-btn" aria-label="Enviar">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            Enviar
          </button>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="toast-wrap" aria-live="assertive" aria-atomic="true"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
